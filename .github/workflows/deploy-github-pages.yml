name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build-only
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ROUTER_MODE: hash
          VITE_SUPERBASE_URL: ${{ secrets.VITE_SUPERBASE_URL }}
          VITE_SUPERBASE_PUBLISH_KEY: ${{ secrets.VITE_SUPERBASE_PUBLISH_KEY }}
          VITE_PAYMENT_PROOF_WHATSAPP: ${{ secrets.VITE_PAYMENT_PROOF_WHATSAPP }}

      - name: Verify build output
        run: |
          test -f dist/index.html
          grep -q '/assets/' dist/index.html
          if grep -q '/src/main.ts' dist/index.html; then
            echo 'Build failed: dist/index.html still references /src/main.ts'
            exit 1
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
